security:
- hmac: []
tags:
- name: Accountpermissions
paths:
  /accountpermissions/list:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: ListAccountPermissions
      description: Lists the permissions an account has to configure Amazon Inspector.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAccountPermissionsResponse'
        '480':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '481':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '482':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '483':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
      parameters:
      - name: maxResults
        in: query
        schema:
          type: string
        description: Pagination limit
        required: false
      - name: nextToken
        in: query
        schema:
          type: string
        description: Pagination token
        required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  description: The maximum number of results to return in the response.
                  type: integer
                  minimum: 1
                  maximum: 1024
                nextToken:
                  description: A token to use for paginating results that are returned in the response. Set the value of this parameter to null for the first request to a list action. For subsequent calls, use the <code>NextToken</code> value returned from the previous request to continue listing results after the first page.
                  type: string
                  minLength: 0
                  maxLength: 1000000
                service:
                  description: The service scan type to check permissions for.
                  type: string
                  enum:
                  - EC2
                  - ECR
                  - LAMBDA
      summary: Amazon Inspector List Account Permissions
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Accountpermissions
components:
  schemas:
    Operation:
      type: string
      enum:
      - ENABLE_SCANNING
      - DISABLE_SCANNING
      - ENABLE_REPOSITORY
      - DISABLE_REPOSITORY
    InternalServerException: {}
    Permissions:
      type: array
      items:
        $ref: '#/components/schemas/Permission'
      minItems: 0
      maxItems: 1024
    Service:
      type: string
      enum:
      - EC2
      - ECR
      - LAMBDA
    AccessDeniedException: {}
    Permission:
      type: object
      required:
      - operation
      - service
      properties:
        operation:
          allOf:
          - $ref: '#/components/schemas/Operation'
          - description: The operations that can be performed with the given permissions.
        service:
          allOf:
          - $ref: '#/components/schemas/Service'
          - description: The services that the permissions allow an account to perform the given operations for.
      description: Contains information on the permissions an account has within Amazon Inspector.
    ListAccountPermissionsResponse:
      type: object
      required:
      - permissions
      properties:
        nextToken:
          allOf:
          - $ref: '#/components/schemas/NextToken'
          - description: A token to use for paginating results that are returned in the response. Set the value of this parameter to null for the first request to a list action. For subsequent calls, use the <code>NextToken</code> value returned from the previous request to continue listing results after the first page.
        permissions:
          allOf:
          - $ref: '#/components/schemas/Permissions'
          - description: Contains details on the permissions an account has to configure Amazon Inspector.
    ThrottlingException: {}
    NextToken:
      type: string
      minLength: 0
      maxLength: 1000000
    ValidationException: {}
  parameters:
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
