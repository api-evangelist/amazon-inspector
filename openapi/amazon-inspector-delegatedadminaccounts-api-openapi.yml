          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '484':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
      parameters: []
      summary: Amazon Inspector Get Delegated Admin Account
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
