  /delegatedadminaccounts/list:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: ListDelegatedAdminAccounts
      description: Lists information about the Amazon Inspector delegated administrator of your organization.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDelegatedAdminAccountsResponse'
        '480':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '481':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '482':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '483':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
      parameters:
      - name: maxResults
        in: query
        schema:
          type: string
        description: Pagination limit
        required: false
      - name: nextToken
        in: query
        schema:
          type: string
        description: Pagination token
        required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  description: The maximum number of results to return in the response.
                  type: integer
                  minimum: 1
                  maximum: 5
                nextToken:
                  description: A token to use for paginating results that are returned in the response. Set the value of this parameter to null for the first request to a list action. For subsequent calls, use the <code>NextToken</code> value returned from the previous request to continue listing results after the first page.
                  type: string
                  minLength: 0
                  maxLength: 1000000
      summary: Amazon Inspector List Delegated Admin Accounts
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Delegatedadminaccounts
components:
  parameters:
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
  schemas:
    DelegatedAdminAccount:
      type: object
      properties:
        accountId:
          allOf:
          - $ref: '#/components/schemas/AccountId'
          - description: The Amazon Web Services account ID of the Amazon Inspector delegated administrator for your organization.
        status:
          allOf:
          - $ref: '#/components/schemas/DelegatedAdminStatus'
          - description: The status of the Amazon Inspector delegated administrator.
      description: Details of the Amazon Inspector delegated administrator for your organization.
    EnableDelegatedAdminAccountResponse:
      type: object
      required:
      - delegatedAdminAccountId
      properties:
        delegatedAdminAccountId:
          allOf:
          - $ref: '#/components/schemas/AccountId'
          - description: The Amazon Web Services account ID of the successfully Amazon Inspector delegated administrator.
    RelationshipStatus:
      type: string
      enum:
      - CREATED
      - INVITED
      - DISABLED
      - ENABLED
      - REMOVED
      - RESIGNED
      - DELETED
      - EMAIL_VERIFICATION_IN_PROGRESS
      - EMAIL_VERIFICATION_FAILED
      - REGION_DISABLED
      - ACCOUNT_SUSPENDED
      - CANNOT_CREATE_DETECTOR_IN_ORG_MASTER
    ListDelegatedAdminAccountsResponse:
      type: object
      properties:
        delegatedAdminAccounts:
          allOf:
          - $ref: '#/components/schemas/DelegatedAdminAccountList'
          - description: Details of the Amazon Inspector delegated administrator of your organization.
        nextToken:
          allOf:
          - $ref: '#/components/schemas/NextToken'
          - description: A token to use for paginating results that are returned in the response. Set the value of this parameter to null for the first request to a list action. For subsequent calls, use the <code>NextToken</code> value returned from the previous request to continue listing results after the first page.
    DelegatedAdmin:
      type: object
      properties:
        accountId:
          allOf:
          - $ref: '#/components/schemas/AccountId'
          - description: The Amazon Web Services account ID of the Amazon Inspector delegated administrator for your organization.
        relationshipStatus:
          allOf:
          - $ref: '#/components/schemas/RelationshipStatus'
          - description: The status of the Amazon Inspector delegated administrator.
      description: Details of the Amazon Inspector delegated administrator for your organization.
    DelegatedAdminAccountList:
      type: array
      items:
        $ref: '#/components/schemas/DelegatedAdminAccount'
      minItems: 0
      maxItems: 5
    AccessDeniedException: {}
    ConflictException: {}
    InternalServerException: {}
    DelegatedAdminStatus:
      type: string
      enum:
      - ENABLED
      - DISABLE_IN_PROGRESS
    AccountId:
      type: string
      pattern: ^\d{12}$
      minLength: 12
      maxLength: 12
    DisableDelegatedAdminAccountResponse:
      type: object
      required:
      - delegatedAdminAccountId
      properties:
        delegatedAdminAccountId:
          allOf:
          - $ref: '#/components/schemas/AccountId'
          - description: The Amazon Web Services account ID of the successfully disabled delegated administrator.
    GetDelegatedAdminAccountResponse:
      type: object
      properties:
        delegatedAdmin:
          allOf:
          - $ref: '#/components/schemas/DelegatedAdmin'
          - description: The Amazon Web Services account ID of the Amazon Inspector delegated administrator.
    ThrottlingException: {}
    ResourceNotFoundException: {}
    NextToken:
      type: string
      minLength: 0
      maxLength: 1000000
    ValidationException: {}
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
