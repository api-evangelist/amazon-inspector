      - ap-northeast-2
      - ap-northeast-3
      - ap-southeast-1
      - ap-southeast-2
      - ap-east-1
      - ap-south-1
      - sa-east-1
      - me-south-1
      default: us-east-1
  description: The Inspector2 multi-region endpoint
- url: http://inspector2.{region}.amazonaws.com.cn
  variables:
    region:
      description: The AWS region
      enum:
      - cn-north-1
      - cn-northwest-1
      default: cn-north-1
  description: The Inspector2 endpoint for China (Beijing) and China (Ningxia)
- url: https://inspector2.{region}.amazonaws.com.cn
  variables:
    region:
      description: The AWS region
      enum:
      - cn-north-1
      - cn-northwest-1
      default: cn-north-1
  description: The Inspector2 endpoint for China (Beijing) and China (Ningxia)
security:
- hmac: []
tags:
- name: Scanning
  description: Operations for enabling and managing vulnerability scanning
paths:
  /enable:
    post:
      operationId: Enable
      summary: Enable Amazon Inspector scanning
      description: Enables Amazon Inspector scanning for one or more resource types in one or more accounts.
      tags:
      - Scanning
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - resourceTypes
              properties:
                accountIds:
                  type: array
                  items:
                    type: string
                resourceTypes:
                  type: array
                  items:
                    type: string
                    enum:
                    - EC2
                    - ECR
                    - LAMBDA
                    - LAMBDA_CODE
      responses:
        '200':
          description: Scanning enabled successfully
        '400':
          description: Bad request
        '403':
          description: Access denied
  /disable:
    post:
      operationId: Disable
      summary: Disable Amazon Inspector scanning
      description: Disables Amazon Inspector scanning for one or more resource types in one or more accounts.
      tags:
      - Scanning
      responses:
        '200':
          description: Scanning disabled successfully
components:
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
externalDocs:
  description: Amazon Web Services documentation
  url: https://docs.aws.amazon.com/inspector2/
x-hasEquivalentPaths: true
